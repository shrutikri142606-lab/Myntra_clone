<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>Position property</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            width : 50px;
            height : 50px;
            background-color: brown;
            margin : 5px;
        }
        #box1{
            position: static;
        }
        #box2{
            position: relative;
            top: 10px;
            left: 50px;
            z-index:1;
        }
        box3{
            position:absolute;
            top:20px;
            z-index:2;
        }
        #box4{
            position:fixed;
            right:50px;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">Box1</div>
    <div id="box2" class="box">Box2</div>
    <div id="box3" class="box">Box3</div>
    <div id="box4" class="box">Box4</div>
</body>
</html>

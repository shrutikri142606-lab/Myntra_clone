<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box model</title>
    <style>
        
        .box{
            height:50px;
            width:50px;
            padding :5px;
        }
        #box1{
            margin:5px 5px 5px 5px;
            background-color: blue;
        }
        #box2{
            margin:50px 5px 5px 5px;
            background-color:blueviolet;
        }
    </style>
</head>
<body>
    <div id="box1" class="box">First</div>
    <div id="box2" class="box">Second</div>
</body>
</html>

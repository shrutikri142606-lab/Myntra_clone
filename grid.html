<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid container</title>
    <style>
        *{
            margin:0;
            padding:0;
        }
        .box{
            height:75;
            width:75;
            border:3px solid black;
            margin:5px;
        }
        #container{
            margin:20;
            padding:10;
            height:300;
            width:600;
            border:3px solid black;
            background-color: lavender;
            display:grid;
            grid-template-columns: 80px 100px;
            grid-template-rows: 50px 100px;
            justify-content: center;
        }
        #box1{
            grid-row:1/2;
            grid-column:1/2;
            background-color: aqua;
            
        }
        #box2{
            grid-row:1/2;
            grid-column:2/2;
            background-color:red;
            
        }
        #box3{
            grid-row:2/2;
            grid-column:1/2;
            background-color:yellow;
            
        }
        #box1{
            grid-row:2/2;
            grid-column:2/2;
            background-color: purple;
            
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="box1" class="box">Grid item 1</div>
        <div id="box2" class="box">Grid item 2</div>
        <div id="box3" class="box">Grid item 3</div>
        <div id="box4" class="box">Grid item 4</div>
    </div>
</body>
</html>

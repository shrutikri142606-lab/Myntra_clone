<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font property</title>
    <style>
        #first{
            font-size: 25px;
            font-weight: 100;
            font-style: italic;
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
        }
        #second{
            font-size: 25px;
            font-weight: 200;
            font-style: normal;
        }
        #third{
            font-size: 25px;
            font-weight: 400;
            font-style: oblique;
        }
        #fourth{
            font-size: 25px;
            font-weight: 900;
            font-style: inherit;
        }
    </style>
</head>
<body>
    <p id="first">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime!</p>
    <!-- <p id="second">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime!</p>

    <p id="fourth">Lorem ipsum dolor sit, amet consectetur adipisicing elit. Maxime!</p> -->
</body>
</html>
